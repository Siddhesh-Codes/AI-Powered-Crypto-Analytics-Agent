<!DOCTYPE html>
<html>
<head>
    <title>Test AI Backend</title>
</head>
<body>
    <h1>AI Backend Test</h1>
    <input type="text" id="messageInput" placeholder="Ask anything about crypto..." style="width: 400px; padding: 10px;">
    <button onclick="testAI()" style="padding: 10px;">Ask AI</button>
    <div id="response" style="margin-top: 20px; padding: 20px; border: 1px solid #ccc; min-height: 100px; white-space: pre-wrap;"></div>

    <script>
        async function testAI() {
            const message = document.getElementById('messageInput').value;
            const responseDiv = document.getElementById('response');
            
            responseDiv.innerHTML = 'Loading...';
            
            try {
                const response = await fetch('http://localhost:8000/api/v1/ai/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: message,
                        user_context: {}
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    responseDiv.innerHTML = `Source: ${data.source}\n\n${data.response}`;
                } else {
                    responseDiv.innerHTML = `Error: ${response.status} ${response.statusText}`;
                }
            } catch (error) {
                responseDiv.innerHTML = `Error: ${error.message}`;
            }
        }
    </script>
</body>
</html>
